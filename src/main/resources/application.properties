# ============================
# Datasource - MySQL
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/fuel_card_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=Ir3l@ndJava
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================
# Flyway
# ============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================
# WebFlux / WebClient
# ============================
app.api.base-url=http://localhost:8080

# ============================
# LangChain4J - Ollama
# ============================
langchain4j.ollama.base-url=http://localhost:11434
langchain4j.ollama.model-name=qwen3:0.6b
langchain4j.ollama.temperature=0.3
langchain4j.ollama.timeout=120s
#langchain4j.ollama.chat-model=

# ============================
# Actuator
# ============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================
# Logging
# ============================
logging.level.com.example.fuelcardagent=DEBUG
logging.level.dev.langchain4j=DEBUG
logging.level.org.springframework.web.reactive=DEBUG
